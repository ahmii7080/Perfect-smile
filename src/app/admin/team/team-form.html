<header class="adm-head">
  <div>
    <h1>{{ editingId() ? 'Edit Member' : 'Add Team Member' }}</h1>
    <span class="adm-head__crumb">
      <a routerLink="/admin/team">Team</a> › {{ editingId() ? 'Edit' : 'New' }}
    </span>
  </div>
  <a routerLink="/admin/team" class="adm-btn adm-btn--ghost">
    <i class="fa-solid fa-arrow-left"></i> Back to list
  </a>
</header>

<div class="adm-toast adm-toast--error" *ngIf="error() as e">
  <i class="fa-solid fa-circle-exclamation"></i> {{ e }}
</div>

<form class="adm-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="adm-row-2">
    <div>
      <label class="form-label">Full name *</label>
      <input class="form-control"
             [class.is-invalid]="invalid('name')"
             formControlName="name"
             (input)="onNameChange($any($event.target).value)"
             placeholder="Muhammad Asad Jameel">
      <div class="form-error" *ngIf="invalid('name')">Name is required.</div>
    </div>
    <div>
      <label class="form-label">Role *</label>
      <input class="form-control"
             [class.is-invalid]="invalid('role')"
             formControlName="role"
             placeholder="Dental Assistant">
      <div class="form-error" *ngIf="invalid('role')">Role is required.</div>
    </div>
  </div>

  <div class="adm-row-2">
    <div>
      <label class="form-label">Initials *</label>
      <input class="form-control"
             [class.is-invalid]="invalid('initials')"
             formControlName="initials"
             maxlength="3"
             placeholder="MA">
      <div class="form-error" *ngIf="invalid('initials')">2–3 letters only.</div>
    </div>
    <div>
      <label class="form-label">Accent colour</label>
      <select class="form-control" formControlName="color">
        <option *ngFor="let c of colors" [value]="c">{{ c }}</option>
      </select>
    </div>
  </div>

  <div>
    <label class="form-label">Photo (optional)</label>
    <div class="adm-image-pick">
      <span class="adm-image-pick__preview" style="border-radius:50%;"
            [style.background-image]="preview() ? 'url(' + preview() + ')' : null">
        <i class="fa-regular fa-user" *ngIf="!preview()"></i>
      </span>
      <div class="adm-image-pick__body">
        <strong>{{ preview() ? 'Change photo' : 'Upload photo' }}</strong>
        <span>Square JPG / PNG works best. Up to 5 MB.</span>
        <input type="file" accept="image/*" (change)="onFileChange($event)" [disabled]="uploading()">
      </div>
    </div>
    <small *ngIf="uploading()" style="color:var(--color-primary); font-size:12px; display:inline-block; margin-top:4px;">
      <i class="fa-solid fa-spinner fa-spin"></i> Uploading…
    </small>
  </div>

  <div class="adm-form__actions">
    <button type="submit" class="adm-btn" [disabled]="saving() || uploading()">
      <ng-container *ngIf="!saving(); else saveLoading">
        <i class="fa-regular fa-floppy-disk"></i> {{ editingId() ? 'Save changes' : 'Add member' }}
      </ng-container>
      <ng-template #saveLoading><i class="fa-solid fa-spinner fa-spin"></i> Saving…</ng-template>
    </button>
    <a routerLink="/admin/team" class="adm-btn adm-btn--ghost">Cancel</a>
  </div>
</form>
