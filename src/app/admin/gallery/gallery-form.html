<header class="adm-head">
  <div>
    <h1>{{ editingId() ? 'Edit Case' : 'Add Gallery Case' }}</h1>
    <span class="adm-head__crumb">
      <a routerLink="/adminauthlogin/gallery">Gallery</a> › {{ editingId() ? 'Edit' : 'New' }}
    </span>
  </div>
  <a routerLink="/adminauthlogin/gallery" class="adm-btn adm-btn--ghost">
    <i class="fa-solid fa-arrow-left"></i> Back to list
  </a>
</header>

<div class="adm-toast adm-toast--error" *ngIf="error() as e">
  <i class="fa-solid fa-circle-exclamation"></i> {{ e }}
</div>

<form class="adm-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div>
    <label class="form-label">Treatment * <small style="color:var(--color-text-muted);">(controls fallback illustration if no photos uploaded)</small></label>
    <select class="form-control" formControlName="treatment"
            (change)="onTreatmentChange($any($event.target).value)">
      <option *ngFor="let t of treatments" [value]="t.value">{{ t.label }}</option>
    </select>
  </div>

  <div class="adm-row-2">
    <div>
      <label class="form-label">Title *</label>
      <input class="form-control"
             [class.is-invalid]="invalid('title')"
             formControlName="title"
             placeholder="Full-arch porcelain veneers">
      <div class="form-error" *ngIf="invalid('title')">Title is required.</div>
    </div>
    <div>
      <label class="form-label">Category *</label>
      <input class="form-control" formControlName="category" placeholder="Veneers">
    </div>
  </div>

  <div>
    <label class="form-label">Description *</label>
    <textarea class="form-control"
              [class.is-invalid]="invalid('description')"
              formControlName="description"
              rows="3"
              placeholder="8 hand-layered porcelain veneers — closing diastema and balancing tooth proportions."></textarea>
    <div class="form-error" *ngIf="invalid('description')">Description is required.</div>
  </div>

  <!-- ============== Before / After Images ============== -->
  <div>
    <label class="form-label" style="margin-bottom: 0.6rem;">
      Before / After photos <small style="color:var(--color-text-muted);">(optional — uploaded photos override the SVG illustration on the site)</small>
    </label>

    <div class="adm-row-2">
      <!-- BEFORE -->
      <div class="adm-image-pick">
        <span class="adm-image-pick__preview"
              [style.background-image]="beforePreview() ? 'url(' + beforePreview() + ')' : null">
          <i class="fa-regular fa-image" *ngIf="!beforePreview()"></i>
        </span>
        <div class="adm-image-pick__body">
          <strong>BEFORE photo</strong>
          <span>JPG / PNG · up to 5 MB</span>
          <input type="file" accept="image/*" (change)="onFileChange($event, 'before')" [disabled]="uploadingBefore()">
          <div style="margin-top:6px;">
            <small *ngIf="uploadingBefore()" style="color:var(--color-primary); font-size:12px;">
              <i class="fa-solid fa-spinner fa-spin"></i> Uploading…
            </small>
            <button type="button" *ngIf="beforePreview() && !uploadingBefore()"
                    (click)="clearImage('before')"
                    style="background:none; border:none; color:#b91c1c; font-size:11.5px; cursor:pointer; padding:0; font-family:inherit;">
              <i class="fa-regular fa-trash-can"></i> Remove
            </button>
          </div>
        </div>
      </div>

      <!-- AFTER -->
      <div class="adm-image-pick">
        <span class="adm-image-pick__preview"
              [style.background-image]="afterPreview() ? 'url(' + afterPreview() + ')' : null">
          <i class="fa-regular fa-image" *ngIf="!afterPreview()"></i>
        </span>
        <div class="adm-image-pick__body">
          <strong>AFTER photo</strong>
          <span>JPG / PNG · up to 5 MB</span>
          <input type="file" accept="image/*" (change)="onFileChange($event, 'after')" [disabled]="uploadingAfter()">
          <div style="margin-top:6px;">
            <small *ngIf="uploadingAfter()" style="color:var(--color-primary); font-size:12px;">
              <i class="fa-solid fa-spinner fa-spin"></i> Uploading…
            </small>
            <button type="button" *ngIf="afterPreview() && !uploadingAfter()"
                    (click)="clearImage('after')"
                    style="background:none; border:none; color:#b91c1c; font-size:11.5px; cursor:pointer; padding:0; font-family:inherit;">
              <i class="fa-regular fa-trash-can"></i> Remove
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div>
    <label class="form-label">Icon class <small style="color:var(--color-text-muted);">(Font Awesome 6, e.g. fa-tooth)</small></label>
    <input class="form-control" formControlName="icon" placeholder="fa-gem">
  </div>

  <div class="adm-form__actions">
    <button type="submit" class="adm-btn" [disabled]="saving() || isUploading()">
      <ng-container *ngIf="!saving(); else saveLoading">
        <i class="fa-regular fa-floppy-disk"></i> {{ editingId() ? 'Save changes' : 'Add case' }}
      </ng-container>
      <ng-template #saveLoading><i class="fa-solid fa-spinner fa-spin"></i> Saving…</ng-template>
    </button>
    <a routerLink="/adminauthlogin/gallery" class="adm-btn adm-btn--ghost">Cancel</a>
  </div>
</form>
